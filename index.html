<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Schlichtplan · Lisa</title>
<style>
:root {
  --bg:#f5f6fa; --card:#fff; --text:#1a1a2e; --t2:#888;
  --a:#ff6b35; --a2:#1a1a2e; --brd:#ddd; --sh:0 2px 8px rgba(0,0,0,.06);
  --sf:#c8e6c9; --ss:#ffe0b2; --sn:#c5cae9; --sm:#e1bee7; --sx:#cfd8dc; --su:#b2ebf2; --sk:#ffcdd2;
}
.dark {
  --bg:#121212; --card:#1e1e24; --text:#eee; --t2:#999; --brd:#2a2a35; --sh:0 2px 12px rgba(0,0,0,.4); --a2:#ddd;
  --sf:#1b5e20; --ss:#e65100; --sn:#1a237e; --sm:#4a148c; --sx:#37474f; --su:#006064; --sk:#b71c1c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--a2);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px}
.topbar .acts{display:flex;gap:4px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 12px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;background:var(--card);color:var(--text);border:2px solid var(--brd);transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-p{background:var(--a);color:#fff;border-color:var(--a)}
.btn-o{border-color:var(--a);color:var(--a);background:transparent}
.btn-g{border:none;background:transparent;color:var(--t2)}
main{max-width:1000px;margin:0 auto;padding:12px}

.tabs{display:flex;gap:2px;margin-bottom:12px;background:var(--card);border-radius:12px;padding:3px;box-shadow:var(--sh)}
.tabs button{flex:1;padding:10px 6px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;border-radius:10px;color:var(--t2);border:none;background:transparent}
.tabs button.on{background:var(--a);color:#fff}

.card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sh);margin-bottom:12px;border:1px solid var(--brd)}

.ma-bar{display:flex;flex-wrap:wrap;gap:6px}
.ma-tag{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:14px;font-size:12px;background:var(--bg);border:2px solid var(--brd)}
.ma-dot{width:9px;height:9px;border-radius:50%;display:inline-block}

.wn{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.wn .lbl{font-size:15px;font-weight:700;min-width:180px}
.wn .sub{font-size:11px;color:var(--t2);display:block}

.scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:600px}
.tbl th{background:var(--a2);color:#fff;padding:7px 3px;font-size:11px;border:1px solid rgba(255,255,255,.15)}
.tbl td{border:1px solid var(--brd);padding:4px 2px;text-align:center;min-width:70px}
.tbl td:first-child{font-weight:700;background:var(--bg);white-space:nowrap;font-size:12px;min-width:60px}
.tbl select{width:100%;padding:6px 0;border:none;background:transparent;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--text);-webkit-appearance:none;-moz-appearance:none;appearance:none}
.tbl select:focus{outline:2px solid var(--a);border-radius:4px}
.tbl .ni{width:100%;padding:3px;border:none;background:transparent;font-size:10px;text-align:center;color:var(--t2);border-bottom:1px dotted var(--brd);outline:none}
.sf{background:var(--sf)!important}.ss{background:var(--ss)!important}.sn{background:var(--sn)!important}.sm{background:var(--sm)!important}.sx{background:var(--sx)!important}.su{background:var(--su)!important}.sk{background:var(--sk)!important}

.bb{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}

.maf{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:flex-end}
.maf input,.maf select{padding:8px 10px;border:2px solid var(--brd);border-radius:8px;font-size:13px;background:var(--bg);color:var(--text)}

.ocr{border:2px dashed var(--brd);border-radius:14px;padding:28px;text-align:center;cursor:pointer;transition:.2s}
.ocr:active{border-color:var(--a);background:rgba(255,107,53,.03)}
.ocr-r{margin-top:10px;max-height:180px;overflow-y:auto;font-size:12px;background:var(--bg);padding:10px;border-radius:8px;white-space:pre-wrap}
.h{display:none!important}

#toast{position:fixed;bottom:16px;right:16px;padding:10px 18px;background:var(--a2);color:#fff;border-radius:10px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;opacity:0;transform:translateY(12px);transition:all .25s}
#toast.on{opacity:1;transform:translateY(0)}

@media(max-width:400px){
  .topbar h1{font-size:15px}
  .tabs button{font-size:11px;padding:8px 4px}
  .wn .lbl{font-size:13px;min-width:130px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>⛽ Schichtplan</h1>
  <div class="acts">
    <button class="btn btn-g" id="ub" disabled onclick="un()">↩</button>
    <button class="btn btn-g" id="rb" disabled onclick="re()">↪</button>
    <button class="btn btn-g" onclick="drk()">🌓</button>
    <button class="btn btn-p" onclick="pdf()">📄</button>
  </div>
</div>

<main id="app">
  <div class="tabs">
    <button class="on" data-t="plan">📅 Plan</button>
    <button data-t="ma">👥 Team</button>
    <button data-t="scan">📸 Scan</button>
  </div>
  <div id="plan-tab"><div id="planContent">Lade...</div></div>
  <div id="ma-tab" class="h"></div>
  <div id="scan-tab" class="h"></div>
</main>
<div id="toast"></div>

<script>
(function(){'use strict';
var D={ma:[],sc:{},nt:{},cfg:{d:0}};
var W=0,U=[],R=[],SR=null;
var TG=['Mo','Di','Mi','Do','Fr','Sa','So'];
var SH=['06-14','14-22','22-06','10-18','08-16','07-15','09-17','12-20','Frei','Urlaub','Krank'];
var CL={};SH.forEach(function(s){CL[s]=CL[s]||shCls(s);});
function shCls(v){
  if(!v||v==='—')return'';
  if(v==='Frei'||v==='frei')return'sx';
  if(v==='Urlaub'||v==='urlaub')return'su';
  if(v==='Krank'||v==='krank')return'sk';
  if(v.indexOf('06')===0)return'sf';
  if(v.indexOf('14')===0)return'ss';
  if(v.indexOf('22')===0)return'sn';
  if(v.indexOf('10')===0)return'sm';
  if(v.indexOf('08')===0||v.indexOf('09')===0||v.indexOf('07')===0)return'su';
  if(v.indexOf('12')===0||v.indexOf('11')===0)return'ss';
  if(/\d/.test(v))return'sf';
  return'';
}

// ==== STORAGE ====
function LD(){
  try{var r=localStorage.getItem('sp_v3');if(r){D=JSON.parse(r);if(!D.cfg)D.cfg={d:0};}}
  catch(e){console.log('Load error',e);}
  if(D.cfg.d)document.body.className='dark';
}

function SV(){
  UP();try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
}

// ==== UNDO ====
function UP(){
  U.push(JSON.stringify({sc:D.sc,nt:D.nt}));if(U.length>30)U.shift();R=[];
  E('ub').disabled=false;E('rb').disabled=true;
}
function UN(){
  if(!U.length)return;
  R.push(JSON.stringify({sc:D.sc,nt:D.nt}));
  var s=JSON.parse(U.pop());D.sc=s.sc;D.nt=s.nt;
  try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
  RP();E('ub').disabled=!U.length;E('rb').disabled=!R.length;
}
function RE(){
  if(!R.length)return;
  U.push(JSON.stringify({sc:D.sc,nt:D.nt}));
  var s=JSON.parse(R.pop());D.sc=s.sc;D.nt=s.nt;
  try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
  RP();E('ub').disabled=!U.length;E('rb').disabled=!R.length;
}

// ==== WEEK ====
function WI(d){
  var n=new Date(),day=n.getDay()||7;
  var m=new Date(n);m.setDate(n.getDate()-day+1+d*7);
  var dts=[];
  for(var i=0;i<7;i++){var x=new Date(m);x.setDate(m.getDate()+i);dts.push(x);}
  var y=dts[0].getFullYear(),j1=new Date(y,0,1);
  var kw=Math.ceil((Math.floor((dts[0]-j1)/86400000)+j1.getDay()+1)/7);
  var rng=dts[0].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+' - '+dts[6].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'});
  return{kw:'KW '+kw,rng:rng,dts:dts};
}

function E(id){return document.getElementById(id);}

// ==== ESCAPE ====
function ES(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function EA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

// ==== RENDER PLAN ====
function RP(){
  var wi=WI(W);
  E('planContent').innerHTML='<div class="card"><div class="ma-bar">'+
    (D.ma.length?D.ma.map(function(m){return'<span class="ma-tag" style="border-color:'+(m.c||'#ff6b35')+'"><span class="ma-dot" style="background:'+(m.c||'#ff6b35')+'"></span>'+ES(m.n)+'</span>';}).join(''):'<span style="color:var(--t2);font-size:12px">Kein Team → Tab Team</span>')+
    '</div></div>'+
    '<div class="card">'+
    '<div class="wn">'+
    '<button class="btn btn-o" onclick="W+=-1;RP()">◀</button>'+
    '<div><div class="lbl">'+wi.kw+'</div><div class="sub">'+wi.rng+'</div></div>'+
    '<button class="btn btn-o" onclick="W+=1;RP()">▶</button>'+
    '<button class="btn" onclick="W=0;RP()">📍 Heute</button>'+
    '</div>'+
    '<div class="scroll"><table class="tbl">'+
    '<thead><tr><th>MA</th>'+TG.map(function(t,i){return'<th>'+t+'<br><span style="font-size:10px;font-weight:400">'+wi.dts[i].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+'</span></th>';}).join('')+'</tr></thead>'+
    '<tbody>'+
    D.ma.map(function(m){
      return'<tr><td>'+ES(m.n)+'</td>'+TG.map(function(tag){
        var k=tag+'-'+m.n,sh=D.sc[k]||'',nt=D.nt[k]||'',cl=shCls(sh)||CL[sh]||'';
        return'<td class="'+cl+'">'+
          '<input style="font-size:12px;font-weight:600" class="ni" list="shlist" placeholder="z.B. 08-16" value="'+EA(sh)+'" onchange="SC(\''+EA(m.n)+'\',\''+tag+'\',this.value)">'+
          '<datalist id="shlist">'+SH.map(function(s){return'<option value="'+s+'">';}).join('')+'</datalist>'+
          '<input class="ni" placeholder="Notiz" value="'+EA(nt)+'" onchange="NT(\''+EA(m.n)+'\',\''+tag+'\',this.value)">'+
          '</td>';
      }).join('')+'</tr>';
    }).join('')+
    '</tbody></table></div>'+
    '<div class="bb">'+
    '<button class="btn" onclick="FA(\'06-14\')">🌅 Alle Früh</button>'+
    '<button class="btn" onclick="FA(\'14-22\')">🌙 Alle Spät</button>'+
    '<button class="btn" onclick="FA(\'22-06\')">🌃 Alle Nacht</button>'+
    '<button class="btn" onclick="CP()">📋 Letzte Woche</button>'+
    '<button class="btn btn-p" onclick="SF()">🧠 Smart Fill</button>'+
    '<button class="btn" onclick="CLR()">🗑 Leeren</button>'+
    '</div></div>';
}

// ==== SHIFT ACTIONS ====
function SC(ma,tag,v){
  var k=tag+'-'+ma;
  UP();if(v)D.sc[k]=v;else delete D.sc[k];
  try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
  RP();
}
function NT(ma,tag,v){
  var k=tag+'-'+ma;
  if(v.trim())D.nt[k]=v;else delete D.nt[k];
  try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
}
function FA(sh){
  UP();TG.forEach(function(t){D.ma.forEach(function(m){D.sc[t+'-'+m.n]=sh;});});
  SV();RP();T('✅ Alle '+sh);
}
function CLR(){
  if(!confirm('Alle Schichten dieser Woche löschen?'))return;
  UP();TG.forEach(function(t){D.ma.forEach(function(m){delete D.sc[t+'-'+m.n];delete D.nt[t+'-'+m.n];});});
  SV();RP();T('🗑 Geleert');
}
function CP(){
  UP();TG.forEach(function(t){D.ma.forEach(function(m){var k=t+'-'+m.n;if(D.sc[k]){var nk=t+'-'+m.n;D.sc[nk]=D.sc[k];}});});
  SV();RP();T('📋 Kopiert');
}
function SF(){
  UP();D.ma.forEach(function(m,i){var mx=m.m||5;TG.forEach(function(t,j){D.sc[t+'-'+m.n]=j<mx?(j<3?'06-14':'14-22'):'Frei';});});
  SV();RP();T('🧠 Smart Fill');
}

// ==== MA MANAGEMENT ====
function RML(){
  E('ma-tab').innerHTML='<div class="card"><h2 style="margin-bottom:10px">👥 Team verwalten</h2>'+
    (D.ma.length?
      D.ma.map(function(m,i){
        return'<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)">'+
          '<span class="ma-dot" style="background:'+(m.c||'#ff6b35')+'"></span><b>'+ES(m.n)+'</b>'+
          '<span style="color:var(--t2);font-size:11px">Max: '+(m.m||5)+' Tage</span>'+
          '<button class="btn" style="margin-left:auto;padding:4px 10px" onclick="RM('+i+')">✕</button></div>';
      }).join('')
    :'<div style="color:var(--t2);padding:10px 0">Noch kein Team.</div>')+
    '<div class="maf">'+
    '<input id="mn" placeholder="Name" style="flex:1;min-width:100px">'+
    '<select id="mc"><option value="#ff6b35">🟠</option><option value="#4caf50">🟢</option><option value="#3f51b5">🔵</option><option value="#f44336">🔴</option><option value="#9c27b0">🟣</option><option value="#00bcd4">🩵</option></select>'+
    '<select id="mm"><option value="7">7</option><option value="6">6</option><option value="5">5</option><option value="4">4</option><option value="3">3</option></select>'+
    '<button class="btn btn-p" onclick="AM()">+ Hinzufügen</button></div></div>';
}

function AM(){
  var n=E('mn').value.trim();if(!n)return;
  D.ma.push({n:n,c:E('mc').value,m:parseInt(E('mm').value)||5});
  E('mn').value='';SV();RML();RP();T('✅ '+n);
}
function RM(i){
  var m=D.ma[i];D.ma.splice(i,1);
  Object.keys(D.sc).forEach(function(k){if(k.slice(-m.n.length)===m.n)delete D.sc[k];});
  Object.keys(D.nt).forEach(function(k){if(k.slice(-m.n.length)===m.n)delete D.nt[k];});
  SV();RML();RP();T('🗑 '+m.n);
}

// ==== SCAN TAB (OCR) ====
function RSC(){
  E('scan-tab').innerHTML='<div class="card"><h2 style="margin-bottom:10px">📸 Plan einscannen</h2>'+
    '<div class="ocr" onclick="document.getElementById(\'sf\').click()">'+
    '<div style="font-size:36px">📷</div><div style="font-weight:600;margin:6px 0">Foto hochladen</div>'+
    '<div style="font-size:11px;color:var(--t2)">Handschriftlicher Plan oder Screenshot</div>'+
    '<input type="file" id="sf" accept="image/*" capture="environment" style="display:none" onchange="SCF(this.files[0])">'+
    '</div><div id="sst" style="margin-top:6px;font-size:13px"></div>'+
    '<div id="spr" class="ocr-r h"></div><div id="sbt" class="h" style="margin-top:8px;display:flex;gap:8px">'+
    '<button class="btn btn-p" onclick="ASC()">✅ Übernehmen</button>'+
    '<button class="btn" onclick="CSC()">Abbrechen</button></div></div>';
}

function SCF(file){
  if(!file)return;
  E('sst').textContent='🔍 Scanne...';
  try{
    var script=document.createElement('script');
    script.src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    script.onload=function(){doScan(file);};
    script.onerror=function(){E('sst').textContent='❌ OCR konnte nicht geladen werden.';};
    if(typeof Tesseract!=='undefined'){doScan(file);return;}
    document.head.appendChild(script);
  }catch(e){E('sst').textContent='❌ Fehler: '+e.message;}
}

async function doScan(file){
  try{
    var worker=await Tesseract.createWorker('deu');
    var ret=await worker.recognize(file);
    await worker.terminate();
    var pr=PT(ret.data.text);
    E('sst').textContent='✅ Erkannt. Prüfen & übernehmen.';
    E('spr').classList.remove('h');
    E('spr').textContent='MA: '+(pr.ma||[]).join(', ')+'\nSchichten: '+JSON.stringify(pr.sc||{});
    E('sbt').classList.remove('h');SR=pr;
  }catch(e){E('sst').textContent='❌ Scan-Fehler: '+e.message;}
}

function PT(txt){
  var r={ma:[],sc:{}};if(!txt)return r;
  var ls=txt.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var tg=['mo','di','mi','do','fr','sa','so'];
  ls.forEach(function(l){
    var m=l.match(/([A-Za-zÄÖÜäöüß]{2,30})\s*[:]?\s*(\d{1,2})[.:](\d{1,2})/i);
    if(m){
      var n=m[1].trim(),sh=m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
      if(sh==='06-14'||sh==='14-22'||sh==='22-06'||sh==='10-18'){
        if(r.ma.indexOf(n)===-1)r.ma.push(n);
        tg.forEach(function(t){if(l.toLowerCase().indexOf(t)!==-1){r.sc[t.charAt(0).toUpperCase()+t.slice(1)+'-'+n]=sh;}});
      }
    }
  });
  return r;
}
function ASC(){
  if(!SR)return;UP();
  (SR.ma||[]).forEach(function(n){if(!D.ma.find(function(m){return m.n===n;}))D.ma.push({n:n,c:'#ff6b35',m:5});});
  Object.keys(SR.sc||{}).forEach(function(k){D.sc[k]=SR.sc[k];});
  SV();RP();RML();CSC();T('✅ Scan übernommen!');
}
function CSC(){SR=null;E('spr').classList.add('h');E('sbt').classList.add('h');E('sst').textContent='';}

// ==== PDF ====
function pdf(){
  var wi=WI(W),wnd=window.open('','_blank','width=900,height=700');
  var h='<!DOCTYPE html><html><head><meta charset="utf-8"><title>Schichtplan</title>'+
    '<style>body{font-family:Arial,sans-serif;padding:16px;font-size:11px;color:#111}'+
    'h1{font-size:20px;text-align:center;margin:0}h3{text-align:center;color:#555;margin:4px 0 12px}'+
    'table{width:100%;border-collapse:collapse;margin-top:10px}'+
    'th{background:#1a1a2e;color:#fff;padding:6px 3px;font-size:10px;border:1px solid rgba(255,255,255,.2)}'+
    'td{border:1px solid #ccc;padding:5px 3px;text-align:center;font-size:11px}td:first-child{font-weight:bold;background:#f5f5f5}'+
    '@media print{@page{size:A4 landscape;margin:4mm}}</style></head><body>'+
    '<h1>SCHICHTPLAN</h1><h3>Total / Allguth Tankstelle</h3><h3>'+wi.kw+' · '+wi.rng+'</h3>'+
    '<table><thead><tr><th>MA</th>'+TG.map(function(t,i){return'<th>'+t+'<br>'+wi.dts[i].toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+'</th>';}).join('')+'</tr></thead><tbody>';
  D.ma.forEach(function(m){
    h+='<tr><td><b>'+ES(m.n)+'</b></td>';
    TG.forEach(function(t){var k=t+'-'+m.n,sh=D.sc[k]||'',nt=D.nt[k]||'';
      h+='<td>'+(sh?'<b>'+sh+'</b>':'')+(sh&&nt?'<br>':'')+(nt?'<span style="font-size:9px;color:#888">'+nt+'</span>':'')+'</td>';});
    h+='</tr>';
  });
  h+='</tbody></table><p style="text-align:center;color:#999;margin-top:16px;font-size:10px">Erstellt '+new Date().toLocaleDateString('de-DE')+'</p></body></html>';
  wnd.document.write(h);wnd.document.close();setTimeout(function(){wnd.print();},600);
}

// ==== DARK MODE ====
function drk(){
  D.cfg.d=!D.cfg.d;
  document.body.className=D.cfg.d?'dark':'';
  try{localStorage.setItem('sp_v3',JSON.stringify(D));}catch(e){}
}

// ==== TOAST ====
function T(msg){
  var t=E('toast');t.textContent=msg;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on');},2000);
}

// ==== TABS ====
document.querySelectorAll('.tabs button').forEach(function(b){
  b.addEventListener('click',function(){
    document.querySelectorAll('.tabs button').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    var t=b.dataset.t;
    E('plan-tab').classList.toggle('h',t!=='plan');
    E('ma-tab').classList.toggle('h',t!=='ma');
    E('scan-tab').classList.toggle('h',t!=='scan');
    if(t==='ma')RML();
    if(t==='scan')RSC();
  });
});
